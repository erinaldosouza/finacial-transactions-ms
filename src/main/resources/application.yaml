spring:
  application:
    name: financial-transaction-ms
    port: 8080

  datasource:
    url: jdbc:postgresql://localhost:5432/customer-transactions-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
